<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mario's Media | Official Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0d11;
            --surface-color: #161a21;
            --border-color: #2d333f;
            --primary-color: #e63946;
            --accent-color: #00d2ff;
            --text-primary: #ffffff;
            --text-secondary: #9da5b4;
            --radius: 16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-color); color: var(--text-primary); padding: 20px; max-width: 1200px; margin: 0 auto; line-height: 1.6; }

        header { display: flex; align-items: center; justify-content: center; padding: 40px 0; border-bottom: 1px solid var(--border-color); margin-bottom: 40px; }
        .logo { height: 160px; width: auto; object-fit: contain; filter: drop-shadow(0 0 15px rgba(0,210,255,0.2)); }

        .panel { background: var(--surface-color); padding: 25px; border-radius: var(--radius); border: 1px solid var(--border-color); margin-bottom: 30px; max-width: 500px; margin-inline: auto; }
        #admin-panel { display: none; border-left: 5px solid var(--primary-color); }
        
        input, textarea { width: 100%; padding: 12px; background: var(--bg-color); border: 1px solid var(--border-color); color: white; border-radius: 8px; margin-bottom: 15px; font-family: inherit; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s; background: white; color: black; }
        button:hover:not(:disabled) { background: var(--primary-color); color: white; }
        button:disabled { opacity: 0.4; cursor: not-allowed; }

        .horizontal-scroll { display: flex; overflow-x: auto; gap: 20px; padding-bottom: 25px; scrollbar-width: thin; }
        .news-card { min-width: 300px; max-width: 300px; background: var(--surface-color); border-radius: var(--radius); border: 1px solid var(--border-color); overflow: hidden; cursor: pointer; transition: 0.3s; }
        .news-card:hover { transform: translateY(-5px); border-color: var(--accent-color); }
        .card-img { width: 100%; height: 180px; object-fit: cover; }
        .card-body { padding: 20px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; overflow-y: auto; padding: 20px; }
        .modal-content { background: var(--surface-color); max-width: 800px; margin: 40px auto; border-radius: var(--radius); overflow: hidden; position: relative; }
        .full-body { padding: 40px; }

        .interaction-bar { display: flex; gap: 15px; margin: 25px 0; border-top: 1px solid var(--border-color); padding-top: 20px; }
        .btn-action { width: auto; padding: 10px 20px; background: var(--bg-color); color: white; border: 1px solid var(--border-color); }
        .btn-action.voted { border-color: var(--accent-color); background: rgba(0, 210, 255, 0.1); }

        .admin-controls { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-delete { background: #441111; color: #ff5555; width: auto; font-size: 0.8rem; }
        .btn-edit { background: #112233; color: #55aaff; width: auto; font-size: 0.8rem; }
    </style>
</head>
<body>

    <header>
        <img src="1000872523.png" alt="Mario's Media" class="logo">
    </header>

    <div class="panel" id="login-panel">
        <h3 style="margin-bottom:15px">Staff & Reader Login</h3>
        <input type="email" id="email-input" placeholder="Enter your email">
        <button onclick="login()">Access Portal</button>
    </div>

    <div class="panel" id="admin-panel">
        <h3>Publish News (Local Device Only)</h3>
        <input type="text" id="post-title" placeholder="Headline">
        <textarea id="post-content" rows="4" placeholder="Story details..."></textarea>
        <button onclick="handlePublish()">Post Locally</button>
    </div>

    <h2 style="margin: 0 0 20px 10px">Global Headlines</h2>
    <div class="horizontal-scroll" id="feed-container"></div>

    <div id="full-view-modal" class="modal" onclick="closeFullView()">
        <div class="modal-content" id="modal-inner" onclick="event.stopPropagation()"></div>
    </div>

    <script>
        const ADMIN_EMAILS = ['marioraziq09.gmail.com', 'marioraziq09@gmail.com'];
        
        // --- PUBLIC NEWS (Everyone sees this) ---
        const GLOBAL_NEWS = [
            {
                id: 'g1',
                title: "Mario's Media Portal is Live",
                content: "The official news destination is now operational. Global readers can access the feed directly via the official domain.",
                image: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&q=80&w=1000",
                likes: 42,
                dislikes: 0
            }
        ];

        let localNews = JSON.parse(localStorage.getItem('marios_local_news')) || [];
        let userVotes = JSON.parse(localStorage.getItem('marios_votes')) || {};
        let isAdmin = false;

        function login() {
            const email = document.getElementById('email-input').value.trim().toLowerCase();
            if(!email) return;
            isAdmin = ADMIN_EMAILS.includes(email);
            document.getElementById('login-panel').style.display = 'none';
            if(isAdmin) document.getElementById('admin-panel').style.display = 'block';
            renderFeed();
        }

        function handlePublish() {
            const title = document.getElementById('post-title').value;
            const content = document.getElementById('post-content').value;
            if(!title || !content) return;
            
            const newPost = { id: 'l_'+Date.now(), title, content, image: 'https://images.unsplash.com/photo-1504711434969-e33886168f5c?auto=format&fit=crop&q=80&w=800', likes: 0, dislikes: 0 };
            localNews.unshift(newPost);
            localStorage.setItem('marios_local_news', JSON.stringify(localNews));
            document.getElementById('post-title').value = '';
            document.getElementById('post-content').value = '';
            renderFeed();
        }

        function vote(id, type) {
            if(userVotes[id]) return;
            const post = [...GLOBAL_NEWS, ...localNews].find(p => p.id === id);
            post[type]++;
            userVotes[id] = type;
            localStorage.setItem('marios_votes', JSON.stringify(userVotes));
            renderFeed();
            openFullView(id);
        }

        function deletePost(id) {
            if(!confirm("Delete this local headline?")) return;
            localNews = localNews.filter(p => p.id !== id);
            localStorage.setItem('marios_local_news', JSON.stringify(localNews));
            closeFullView();
            renderFeed();
        }

        function renderFeed() {
            const container = document.getElementById('feed-container');
            const allNews = [...GLOBAL_NEWS, ...localNews];
            container.innerHTML = allNews.map(n => `
                <div class="news-card" onclick="openFullView('${n.id}')">
                    <img src="${n.image}" class="card-img">
                    <div class="card-body"><h3>${n.title}</h3></div>
                </div>
            `).join('');
        }

        function openFullView(id) {
            const n = [...GLOBAL_NEWS, ...localNews].find(p => p.id === id);
            const voted = userVotes[id];
            
            document.getElementById('modal-inner').innerHTML = `
                <img src="${n.image}" style="width:100%; max-height:350px; object-fit:cover">
                <div class="full-body">
                    ${isAdmin && id.startsWith('l_') ? `
                        <div class="admin-controls">
                            <button class="btn-delete" onclick="deletePost('${n.id}')">🗑️ Delete</button>
                        </div>
                    ` : ''}
                    <h2>${n.title}</h2>
                    <p style="margin:20px 0; color:var(--text-secondary); white-space:pre-wrap;">${n.content}</p>
                    
                    <div class="interaction-bar">
                        <button class="btn-action ${voted==='likes'?'voted':''}" onclick="vote('${n.id}','likes')" ${voted?'disabled':''}>👍 ${n.likes}</button>
                        <button class="btn-action ${voted==='dislikes'?'voted':''}" onclick="vote('${n.id}','dislikes')" ${voted?'disabled':''}>👎 ${n.dislikes}</button>
                    </div>
                    <button onclick="closeFullView()">Back to Feed</button>
                </div>
            `;
            document.getElementById('full-view-modal').style.display = 'block';
        }

        function closeFullView() { document.getElementById('full-view-modal').style.display = 'none'; }
        
        renderFeed();
    </script>
</body>
</html>
